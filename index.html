<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <link href="/style.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>제휴 문의</h1>
    <p>협력 제안이나 문의 사항이 있으시면 아래 양식을 작성해 주세요.</p>
    <form action="https://formspree.io/f/xkoqrylg" method="POST" id="contact-form">
      <div class="form-group">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" placeholder="성함을 입력하세요" required>
      </div>

      <div class="form-group">
        <label for="email">이메일 주소</label>
        <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
      </div>

      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="5" placeholder="제휴하고 싶은 내용을 상세히 적어주세요" required></textarea>
      </div>

      <button type="submit">문의 보내기</button>
    </form>
  </div>
  <script defer src="/main.js"></script>
</body>
</html>
