<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 관상 테스트 | 얼굴로 보는 나의 성격</title>
  <script>
    const savedTheme = localStorage.getItem('theme') || 
                       (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
  <link href="/mbti.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="nav-links">
      <a href="/index.html" class="nav-btn">🍴 점심 메뉴 추천받기</a>
    </div>

    <header>
      <h1>MBTI 관상 테스트 🎭</h1>
      <p>인공지능이 당신의 관상을 분석해 MBTI를 예측해 드립니다.</p>
    </header>

    <main>
      <div id="test-container" class="test-box">
        <div id="webcam-container"></div>
        <div id="label-container"></div>
        <div id="result-display" class="hidden">
          <h2>당신의 관상 MBTI는?</h2>
          <div id="top-prediction" class="mbti-result"></div>
          <p id="mbti-description"></p>
        </div>
      </div>

      <div class="controls">
        <button id="start-btn" type="button" class="primary-btn">카메라 켜기 &amp; 테스트 시작</button>
      </div>
    </main>

    <hr class="divider">

    <!-- 댓글 섹션 -->
    <section class="comment-section">
      <div id="disqus_thread"></div>
      <script>
          var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = window.location.pathname;
          };
          (function() {
          var d = document, s = d.createElement('script');
          s.src = 'https://product-build-3.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
    </section>

    <footer>
      <p>본 테스트는 재미로만 즐겨주세요!</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="/mbti.js"></script>
</body>
</html>
