<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 관상 테스트 | 얼굴로 보는 나의 성격</title>
  <script>
    const savedTheme = localStorage.getItem('theme') || 
                       (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
  <link href="/mbti.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="header-nav">
      <a href="/index.html" class="nav-btn">🍴 점심 메뉴 추천받기</a>
      <button id="theme-toggle" type="button" aria-label="테마 변경">
        <span class="mode-icon">🌙</span>
      </button>
    </div>

    <header>
      <h1>MBTI 관상 테스트 🎭</h1>
      <p>얼굴 분석으로 알아보는 나의 성격!</p>
    </header>

    <main>
      <div id="test-container" class="test-box">
        <!-- 이미지/웹캠 표시 영역 -->
        <div id="media-container" class="media-placeholder">
          <img id="face-preview" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" class="hidden" alt="얼굴 미리보기">
          <div id="webcam-container"></div>
        </div>

        <!-- 결과 표시 영역 -->
        <div id="result-display" class="hidden">
          <h2>당신의 관상 MBTI는?</h2>
          <div id="top-prediction" class="mbti-result"></div>
          <p id="mbti-description"></p>
          <div id="label-container"></div>
        </div>
      </div>

      <div class="controls">
        <div class="btn-group">
          <button id="webcam-btn" type="button" class="primary-btn">📸 카메라로 측정</button>
          <label for="image-upload" class="upload-label">📁 사진 업로드 측정</label>
          <input type="file" id="image-upload" accept="image/*" class="hidden">
        </div>
        <button id="reset-btn" type="button" class="text-btn hidden">다시 테스트하기</button>
      </div>
    </main>

    <hr class="divider">

    <section class="comment-section">
      <div id="disqus_thread"></div>
      <script>
          var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = window.location.pathname;
          };
          (function() {
          var d = document, s = d.createElement('script');
          s.src = 'https://product-build-3.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
    </section>

    <footer>
      <p>본 테스트는 재미로만 즐겨주세요!</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="/mbti.js"></script>
</body>
</html>
